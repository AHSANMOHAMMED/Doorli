<script>
        // Simple micro-interaction for list items
        document.querySelectorAll('button').forEach(button => {
            button.addEventListener('mousedown', () => {
                button.classList.add('scale-[0.98]');
            });
            button.addEventListener('mouseup', () => {
                button.classList.remove('scale-[0.98]');
            });
            button.addEventListener('mouseleave', () => {
                button.classList.remove('scale-[0.98]');
            });
        });

        // Background atmosphere: Subtle radial movement
        const body = document.body;
        body.addEventListener('mousemove', (e) => {
            const x = e.clientX / window.innerWidth;
            const y = e.clientY / window.innerHeight;
            body.style.backgroundImage = `radial-gradient(circle at ${x * 100}% ${y * 100}%, rgba(80, 225, 105, 0.05) 0%, transparent 50%)`;
        });
    </script>
