<!-- Micro-interaction Script -->
<script>
        document.addEventListener('DOMContentLoaded', () => {
            const input = document.querySelector('input[type="tel"]');
            const button = document.querySelector('button.bg-primary-container');
            
            input.addEventListener('input', (e) => {
                // Remove non-digit characters
                e.target.value = e.target.value.replace(/\D/g, '');
                
                // Toggle button state based on phone number length (e.g., 9 digits for UAE)
                if (e.target.value.length === 9) {
                    button.classList.add('shadow-primary/30');
                } else {
                    button.classList.remove('shadow-primary/30');
                }
            });

            // Gentle parallax on the illustration
            const illustration = document.querySelector('img[data-alt]');
            window.addEventListener('mousemove', (e) => {
                const moveX = (e.clientX - window.innerWidth / 2) / 50;
                const moveY = (e.clientY - window.innerHeight / 2) / 50;
                illustration.style.transform = `translate(${moveX}px, ${moveY}px)`;
            });
        });
    </script>
