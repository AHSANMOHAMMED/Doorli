services:
  postgres:
    image: postgis/postgis:16-3.4
    container_name: doorli-postgres
    restart: unless-stopped
    environment:
      POSTGRES_USER: doorli
      POSTGRES_PASSWORD: doorli
      POSTGRES_DB: doorli
    ports:
      - '5432:5432'
    volumes:
      - doorli_postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ['CMD-SHELL', 'pg_isready -U doorli -d doorli']
      interval: 5s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: doorli-redis
    restart: unless-stopped
    ports:
      - '6379:6379'
    volumes:
      - doorli_redis_data:/data
    healthcheck:
      test: ['CMD', 'redis-cli', 'ping']
      interval: 5s
      timeout: 5s
      retries: 5

volumes:
  doorli_postgres_data:
  doorli_redis_data:
